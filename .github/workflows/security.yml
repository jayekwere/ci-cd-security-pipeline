# Hardened CI security pipeline: SAST (Semgrep) + SCA (Snyk) + secrets (TruffleHog)
#
# Supply-chain note: third-party actions are tag-pinned here for readability.
# Run `scripts/pin-actions.sh .github/workflows/security.yml` to convert these to
# verified commit SHAs (production posture). Dependabot keeps both deps and pins fresh.

name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sast-semgrep:
    name: SAST — Semgrep (pattern)
    # Skip on Dependabot PRs: they run with a read-only token and no repo secrets,
    # so secret-dependent jobs would fail. Dependabot updates are reviewed as PRs.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Semgrep
        run: pip install semgrep
      - name: Run Semgrep (SARIF)
        # report-only: findings populate the Security tab without failing the build,
        # so the demo stays green while alerts remain visible. See docs/gating-policy.md.
        run: |
          semgrep scan \
            --config p/default \
            --config p/security-audit \
            --sarif --output semgrep.sarif || true
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  sca-snyk:
    name: SCA — Snyk (dependencies)
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - name: Run Snyk (report-only — see gating policy)
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=app/requirements.txt --sarif-file-output=snyk.sarif --severity-threshold=high
      - name: Check SARIF exists
        id: snyk_sarif
        if: always()
        run: |
          if [ -f snyk.sarif ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No snyk.sarif produced (likely missing SNYK_TOKEN) — skipping upload."
          fi
      - name: Upload SARIF
        if: always() && steps.snyk_sarif.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk.sarif
          category: snyk

  secrets-trufflehog:
    name: Secrets — TruffleHog (full history, verified)
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full git history, not just current files
      - name: Scan git history for verified secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified   # live-credential verification, cut false positives

  gate:
    name: Gate
    if: github.actor != 'dependabot[bot]'
    needs: [sast-semgrep, secrets-trufflehog]
    runs-on: ubuntu-latest
    steps:
      - name: Enforce gate
        run: |
          echo "SAST and secrets stages completed."
          echo "Findings are reported to Security > Code scanning."
          echo "SCA runs report-only for known-deferred dependencies (docs/gating-policy.md)."
